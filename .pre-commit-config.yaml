# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  # General-purpose file hygiene hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        description: Trims trailing whitespace from files.
      - id: end-of-file-fixer
        description: Ensures files end with a newline.
      - id: check-yaml
        description: Validates YAML syntax.
        # Allow custom tags if any, otherwise standard validation
        args: [--unsafe]
      - id: check-added-large-files
        description: Prevents giant files from being committed.
        args: [--maxkb=500]
      - id: check-merge-conflict
        description: Checks for files containing merge conflict strings.
      - id: detect-private-key
        description: Detects the presence of private keys.

  # Go-specific linting using golangci-lint
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.12.2
    hooks:
      - id: golangci-lint
        description: Runs golangci-lint on modified Go files.
